# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have a packages directory, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "xt-remote-proc"
BBFILE_PATTERN_xt-remote-proc := "^${LAYERDIR}/"
BBFILE_PRIORITY_xt-remote-proc = "12"

LAYERSERIES_COMPAT_xt-remote-proc = "kirkstone"

